<!DOCTYPE html>

<title>ビューフィールド貸出管理</title>
<!-- jsQR: jsdelivr → unpkg の順でフォールバック読み込み -->
<script>
(function(){
  var cdns = [
    'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js',
    'https://unpkg.com/jsqr@1.4.0/dist/jsQR.js'
  ];
  var i = 0;
  function tryLoad() {
    if (i >= cdns.length) return;
    var s = document.createElement('script');
    s.src = cdns[i++];
    s.onerror = tryLoad; // 失敗したら次のCDNを試す
    document.head.appendChild(s);
  }
  tryLoad();
})();
</script>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --primary: #1a56db;
    --primary-dark: #1340a8;
    --danger: #e02424;
    --success: #057a55;
    --warning: #c27803;
    --text: #111928;
    --text-sub: #6b7280;
    --border: #e5e7eb;

<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ========== APP VERSION ==========
const APP_VERSION = '1.8.0';
const PORTAL_URL  = 'https://beaufield.github.io/beaufield-dev/';

// ========== DATA STORE ==========
const API_URL = 'https://script.google.com/macros/s/AKfycbzWQEPQ89DwT7n38vtLFf1COx0rz13-qKC7GM1dZBiEBYP5GV5H_3J-Olz_rR2ckr4o/exec';

let db = {
  devices: [],
  loans: [],
  salesReps: [],
  makers: [],
  labels: [],
  nextDeviceId: 1,
  nextLoanId: 1,
  nextRepId: 1,
  nextMakerId: 1,
};

function showLoading() {
  let el = document.getElementById('loading-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loading-overlay';
    el.className = 'loading-overlay';
    el.innerHTML = '<div class="loading-spinner"></div><span>読み込み中...</span>';
    document.body.appendChild(el);
  }
  el.style.display = 'flex';
}

function hideLoading() {
  const el = document.getElementById('loading-overlay');
  if (el) el.style.display = 'none';
}

async function apiGet() {
  const res = await fetch(API_URL);
  if (!res.ok) throw new Error('API error');
  return res.json();
}

async function apiPost(action, data) {
  // URLSearchParams形式で送信（GASのe.parameterで受け取り可能、CORSプリフライト不要）
  const params = new URLSearchParams();
  params.append('action', action);
  params.append('data', JSON.stringify(data));

  const requestBody = params.toString();

  let res;
  try {
    res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: requestBody,
    });
  } catch (networkErr) {
    throw new Error('ネットワークエラー: ' + networkErr.message);
  }

  if (!res.ok) {
    const errText = await res.text().catch(() => '(本文取得不可)');
    throw new Error(`HTTPエラー ${res.status}: ${errText}`);
  }

  let json;
  try {
    const rawText = await res.text();
    json = JSON.parse(rawText);
  } catch (parseErr) {
    throw new Error('レスポンスのJSONパースに失敗: ' + parseErr.message);
  }

  // POSTがGETにリダイレクトされた場合の検出:
  // doGetのレスポンス（devicesキーがある）が返ってきた場合はエラー扱い
  if (json && 'devices' in json && !('status' in json)) {
    throw new Error('POSTがGETにリダイレクトされました（GAS設定エラー）');
  }

  return json;
}

// ========== AUTH ==========
const SESSION_KEY = 'bf_session'; // ポータルと共通キー
const SESSION_MS  = 30 * 24 * 60 * 60 * 1000; // 30日

let currentUser = null;
let authUsers   = [];
let selectedUser = null;
let pinValue     = '';

// PIN変更
let changePinStep    = 0;   // 0=現在PIN入力中, 1=新PIN入力中
let changePinCurrent = '';  // ステップ0で入力した現在PIN
let changePinValue   = '';  // 入力中のPIN

function _getBfSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s.user_id) return null;
    // expires（ポータル形式）またはsaved_at（旧形式）で期限チェック
    const expiry = s.expires || (s.saved_at ? s.saved_at + SESSION_MS : 0);
    if (Date.now() > expiry) { localStorage.removeItem(SESSION_KEY); return null; }
    return s;
  } catch(e) { return null; }
}

function saveSession(user) {
  try {
    const existing = _getBfSession() || {};
    localStorage.setItem(SESSION_KEY, JSON.stringify({ ...existing, ...user }));
  } catch(e) {}
}

function tryAutoLogin() {
  const s = _getBfSession();
  if (!s) return false;
  currentUser = { user_id: s.user_id, name: s.name, role: s.role || 'user' };
  return true;
}

function logout() {
  localStorage.removeItem(SESSION_KEY); // bf_session削除（全アプリ共通ログアウト）
  location.replace(PORTAL_URL);         // ポータルへリダイレクト
}

async function loadAuthUsers() {
  try {
    const json = await apiPost('getAuthUsers', {});
    if (json.status === 'ok') authUsers = json.result.users || [];
  } catch(e) { authUsers = []; }
  render();
}

function renderLogin() {
  const grid = authUsers.length === 0
    ? `<div style="text-align:center;color:#9ca3af;padding:32px 0;">ユーザー情報を読み込み中...</div>`

function openLoginPinModal(userId, userName) {
  selectedUser = { user_id: userId, name: userName };
  pinValue = '';
  updateLoginPinDots();
  document.getElementById('login-pin-title').textContent = userName + ' のPINを入力';
  document.getElementById('login-pin-error').textContent = '';
  document.getElementById('login-pin-modal').style.display = 'flex';
}

function closeLoginPinModal() {
  document.getElementById('login-pin-modal').style.display = 'none';
  selectedUser = null;
  pinValue = '';
}

function loginPinInput(digit) {
  if (pinValue.length >= 4) return;
  pinValue += digit;
  updateLoginPinDots();
  if (pinValue.length === 4) setTimeout(submitLoginPin, 150);
}

function loginPinBackspace() {
  pinValue = pinValue.slice(0, -1);
  updateLoginPinDots();
}

function updateLoginPinDots() {
  for (var i = 0; i < 4; i++) {
    const el = document.getElementById('lpd' + i);
    if (el) el.style.background = i < pinValue.length ? '#1a56db' : '#e5e7eb';
  }
}

async function submitLoginPin() {
  if (!selectedUser || pinValue.length !== 4) return;
  showLoading();
  document.getElementById('login-pin-error').textContent = '';
  const pin = pinValue;
  try {
    const json = await apiPost('login', { user_id: selectedUser.user_id, pin: pin });
    if (json.status === 'error') throw new Error(json.error);
    currentUser = json.result;
    saveSession(json.result);
    closeLoginPinModal();
    await loadDB();
  } catch(e) {
    document.getElementById('login-pin-error').textContent = 'PINが正しくありません';
    pinValue = '';
    updateLoginPinDots();
  } finally {
    hideLoading();
  }
}

// ─── PIN変更 ───────────────────────────────────────────────
function openChangePinModal() {
  changePinStep    = 0;
  changePinCurrent = '';
  changePinValue   = '';
  document.getElementById('change-pin-step-label').textContent = '現在のPINを入力してください';
  document.getElementById('change-pin-error').textContent = '';
  updateChangePinDots();
  document.getElementById('change-pin-modal').style.display = 'flex';
}
function closeChangePinModal() {
  document.getElementById('change-pin-modal').style.display = 'none';
  changePinStep = 0; changePinCurrent = ''; changePinValue = '';
}
function changePinInput(digit) {
  if (changePinValue.length >= 4) return;
  changePinValue += digit;
  updateChangePinDots();
  if (changePinValue.length === 4) setTimeout(processChangePinStep, 150);
}
function changePinBackspace() {
  changePinValue = changePinValue.slice(0, -1);
  updateChangePinDots();
}
function updateChangePinDots() {
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById('cpd' + i);
    if (el) el.style.background = i < changePinValue.length ? '#1a56db' : '#e5e7eb';
  }
}
async function processChangePinStep() {
  if (changePinStep === 0) {
    // ステップ0：現在PINを記録してステップ1へ
    changePinCurrent = changePinValue;
    changePinValue   = '';
    changePinStep    = 1;
    document.getElementById('change-pin-step-label').textContent = '新しいPINを入力してください';
    document.getElementById('change-pin-error').textContent = '';
    updateChangePinDots();
  } else {
    // ステップ1：新PINでAPIコール
    const newPin = changePinValue;
    showLoading();
    try {
      const json = await apiPost('changePin', {
        user_id:     currentUser.user_id,
        current_pin: changePinCurrent,
        new_pin:     newPin
      });
      if (json.status === 'error') throw new Error(json.error);
      closeChangePinModal();
      showToast('PINを変更しました ✅');
    } catch(e) {
      changePinValue   = '';
      changePinStep    = 0;
      changePinCurrent = '';
      document.getElementById('change-pin-step-label').textContent = '現在のPINを入力してください';
      document.getElementById('change-pin-error').textContent = '現在のPINが正しくありません';
      updateChangePinDots();
    } finally {
      hideLoading();
    }
  }
}

const DB_CACHE_KEY = 'kiki_db_v1';

function saveDBCache() {
  try { localStorage.setItem(DB_CACHE_KEY, JSON.stringify(db)); } catch(e) {}
}

async function loadDB() {
  // キャッシュがあれば即レンダリング（体感速度を上げる）
  const cached = localStorage.getItem(DB_CACHE_KEY);
  if (cached) {
    try { db = JSON.parse(cached); render(); } catch(e) {}
  }
  showLoading();
  try {
    const data = await apiGet();
    db = data;
    saveDBCache();
    render();
  } catch(e) {
    if (!cached) showToast('通信エラーが発生しました', 'error');
    if (!cached) render();
  } finally {
    hideLoading();
  }
}

async function saveDB() {
  try {
    await apiPost('saveDB', db);
  } catch(e) {
    showToast('保存失敗: ' + e.message, 'error');
    throw e;
  }
}

// ========== HELPERS ==========
function genId(prefix, num) {
  return prefix + String(num).padStart(6, '0');
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function getDeviceInfo() {
  const ua = navigator.userAgent;
  let os = 'Unknown OS';
  let browser = 'Unknown Browser';
  if (/iPhone/.test(ua)) os = 'iPhone';
  else if (/iPad/.test(ua)) os = 'iPad';
  else if (/Android/.test(ua)) os = 'Android';
  else if (/Windows/.test(ua)) os = 'Windows';
  else if (/Mac/.test(ua)) os = 'Mac';
  if (/CriOS|Chrome/.test(ua) && !/Edg/.test(ua)) browser = 'Chrome';
  else if (/Safari/.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
  else if (/Firefox/.test(ua)) browser = 'Firefox';
  else if (/Edg/.test(ua)) browser = 'Edge';
  return `${os} / ${browser}`;
}

function getLastOperator() {
  return localStorage.getItem('lastOperator') || '';
}

function saveLastOperator(name) {
  localStorage.setItem('lastOperator', name);
}

function fmtDate(d) {
  if (!d) return '—';
  return d.split('T')[0].replace(/-/g, '/');
}

function isOverdue(device) {
  if (device.status !== '貸出中') return false;
  if (!device.returnDueDate) return false;
  return device.returnDueDate < today();
}

function getStats() {
  const active = db.devices.filter(d => d.status !== '廃棄' && d.status !== 'メーカー返却済');
  const total = active.length;
  const loan = active.filter(d => d.status === '貸出中').length;
  const overdue = active.filter(d => isOverdue(d)).length;
  return { total, loan, overdue };
}

// ========== TOASTS ==========
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  // エラー時は長めに表示（8秒）、それ以外は3秒
  const duration = type === 'error' ? 8000 : 2800;
  toastTimer = setTimeout(() => { t.className = 'toast'; }, duration);
}

// ========== ROUTER ==========
let currentView = 'home';
let viewStack = [];
let viewData = {};
let pendingImages = {}; // { reg: [img0,img1,img2], loan: img, edit: [img0,img1,img2] }
let clearedSlots  = {}; // edit用: { 0:true, 1:true, 2:true } 削除済みスロット追跡

function navigate(view, data = {}) {
  viewStack.push({ view: currentView, data: viewData });
  currentView = view;
  viewData = data;
  render();
}

function goBack() {
  if (viewStack.length === 0) return;
  const prev = viewStack.pop();
  currentView = prev.view;
  viewData = prev.data;
  render();
}

function resetTo(view) {
  viewStack = [];
  currentView = view;
  viewData = {};
  render();
}

function render() {
  const app = document.getElementById('app');
  // Stop any running QR scanner
  stopScanner();
  
  const views = {
    home: renderHome,
    devices: renderDevices,
    scanner: renderScanner,
    deviceDetail: renderDeviceDetail,
    loanForm: renderLoanForm,
    returnForm: renderReturnForm,
    registerForm: renderRegisterForm,
    editDevice: renderEditDevice,
    settings: renderSettings,
    salesReps: renderSalesReps,
    makers: renderMakers,
    labelPool: renderLabelPool,
    disposedDevices: renderDisposedDevices,
    makerReturnedDevices: renderMakerReturnedDevices,
  };

  if (!currentUser) {
    app.innerHTML = renderLogin();
    afterRender();
    return;
  }

  const fn = views[currentView] || renderHome;
  app.innerHTML = fn();
  afterRender();
  window.scrollTo(0, 0);
}

// ========== DEVICES ==========
function renderDevices() {
  const filter = viewData.filter || 'all';
  const makerFilter = viewData.makerFilter || '';
  const search = viewData.search || '';
  const activeDevices = db.devices.filter(d => d.status !== '廃棄' && d.status !== 'メーカー返却済');

  let devices = [...activeDevices];
  if (filter === 'loan') {
    devices = devices.filter(d => d.status === '貸出中');
    // 返却期限が近い順（未設定は末尾）
    devices.sort((a, b) => {
      if (!a.returnDueDate && !b.returnDueDate) return 0;
      if (!a.returnDueDate) return 1;
      if (!b.returnDueDate) return -1;
      return a.returnDueDate.localeCompare(b.returnDueDate);
    });
  }
  if (filter === 'in') devices = devices.filter(d => d.status === '社内');
  if (filter === 'overdue') {
    devices = devices.filter(d => isOverdue(d));
    devices.sort((a, b) => (a.returnDueDate||'').localeCompare(b.returnDueDate||''));
  }
  if (filter === 'soon') {
    const todayStr2 = today();
    const lim = new Date(todayStr2); lim.setDate(lim.getDate() + 3);
    const limStr = lim.toISOString().split('T')[0];
    devices = devices.filter(d => d.status === '貸出中' && d.returnDueDate && d.returnDueDate > todayStr2 && d.returnDueDate <= limStr);
    devices.sort((a, b) => a.returnDueDate.localeCompare(b.returnDueDate));
  }
  if (filter === 'nodate') devices = devices.filter(d => d.status === '貸出中' && !d.returnDueDate);
  if (filter === 'maker') devices = devices.filter(d => d.type === 'メーカー借入' && d.status === '貸出中');
  if (filter === 'byMaker') {
    if (makerFilter) devices = devices.filter(d => d.maker === makerFilter);

    const q = search.toLowerCase();
    devices = devices.filter(d => d.name.toLowerCase().includes(q) || d.labelId.toLowerCase().includes(q) || (d.loanTo||'').toLowerCase().includes(q) || (d.salesRep||'').toLowerCase().includes(q));

function stopScanner() {
  scannerActive = false;
  if (scannerStream) {
    scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
  }
  scannerCanvas = null;
  scannerCtx = null;
  barcodeDetector = null;

function handleManualLabel() {
  const val = document.getElementById('manual-label').value.trim().toUpperCase();
  if (!val) return;
  handleScannedLabel(val);
}

function handleScannedLabel(labelId) {
  stopScanner();
  const device = db.devices.find(d => d.labelId === labelId);
  
  if (scannerMode === 'loan') {
    if (!device) {
      if (confirm(`LabelID「${labelId}」は未登録です。\n新規商品として登録しますか？`)) {
        navigate('registerForm', { labelId });
      }
      return;
    }
    if (device.status === '貸出中') {
      showToast('この商品は現在貸出中です', 'error');
      navigate('deviceDetail', { deviceId: device.id });
      return;
    }
    navigate('loanForm', { deviceId: device.id });
  } else if (scannerMode === 'return') {
    if (!device) {
      showToast('登録されていない商品です', 'error');
      return;
    }
    if (device.status === '社内') {
      showToast('この商品は既に社内にあります', 'error');
      navigate('deviceDetail', { deviceId: device.id });
      return;
    }
    navigate('returnForm', { deviceId: device.id });
  } else {
    if (!device) {
      if (confirm(`LabelID「${labelId}」は未登録です。\n新規商品として登録しますか？`)) {
        navigate('registerForm', { labelId });
      }
      return;
    }
    navigate('deviceDetail', { deviceId: device.id });
  }
}

async function submitLoan(deviceId) {
  const operator = currentUser ? currentUser.name : '';
  const salon = document.getElementById('f-salon').value.trim();
  const rep = document.getElementById('f-rep').value;
  const duedate = document.getElementById('f-duedate').value;
  const notes = document.getElementById('f-notes').value.trim();

  if (!salon) { showToast('貸出先サロン名を入力してください', 'error'); return; }
  if (!rep) { showToast('営業担当を選択してください', 'error'); return; }

  const salonLoanCount = db.devices.filter(d => d.status === '貸出中' && d.loanTo === salon).length;
  if (salonLoanCount > 0) {
    showToast(`このサロンには現在 ${salonLoanCount} 点貸出中です`, 'warn');
    await new Promise(r => setTimeout(r, 1800));
  }

  const device = db.devices.find(d => d.id === deviceId);
  device.status = '貸出中';
  device.loanTo = salon;
  device.salesRep = rep;
  device.loanDate = today();
  device.returnDueDate = duedate || null;
  device.notes = notes;

  const newLoan = {
    id: db.nextLoanId++,
    deviceId,
    labelId: device.labelId,
    deviceName: device.name,
    type: '貸出',
    loanTo: salon,
    salesRep: rep,
    date: today(),
    returnDueDate: duedate || null,
    notes,
    registeredBy: operator,
    deviceInfo: getDeviceInfo(),
  };
  db.loans.push(newLoan);

  showLoading();
  try {
    const imageUrl = await uploadPendingImage('loan');
    if (imageUrl) { device.imageUrl = imageUrl; newLoan.imageUrl = imageUrl; }
    // saveDevice + saveLoan（LINE WORKS通知含む）を1回のGASコールで処理
    await apiPost('saveLoanTransaction', { device, loan: newLoan });
    pendingImages['loan'] = null;
    saveDBCache();
    showToast('貸出登録しました ✓', 'success');
    currentView = 'home';
    viewData = {};
    viewStack = [];
    navigate('deviceDetail', { deviceId });
  } catch(e) {} finally {
    hideLoading();
  }
}

// 3枚スロットのHTML生成（reg/edit共通）
// existingUrls: [url0, url1, url2] 既存画像URL（nullは空スロット）
function renderImageSlots(type, existingUrls) {
  const urls = existingUrls || [];
  let html = '';
  for (let i = 0; i < 3; i++) {
    const ex = urls[i] || null;
    html += `
      <input type="file" id="f-img-${type}-${i}" accept="image/*" style="display:none" onchange="handleImageSelect('${type}', this, ${i})">
      <div style="width:88px;height:88px;border:1.5px dashed var(--border);border-radius:10px;position:relative;overflow:hidden;background:var(--bg-card);cursor:pointer;flex-shrink:0;" onclick="document.getElementById('f-img-${type}-${i}').click()">
        <img id="img-thumb-${type}-${i}" src="${ex || ''}" style="width:100%;height:100%;object-fit:cover;border-radius:9px;${ex ? '' : 'display:none;'}">
        <div id="img-label-${type}-${i}" style="${ex ? 'display:none;' : ''}position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:var(--text-sub);gap:2px;pointer-events:none;"><span style="font-size:20px;">📷</span><span>${i + 1}枚目</span></div>
        <button id="img-del-${type}-${i}" style="display:${ex ? '' : 'none'};position:absolute;top:3px;right:3px;background:rgba(220,38,38,0.85);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;padding:0;line-height:1;" onclick="event.stopPropagation();clearImage('${type}',${i})">✕</button>
      </div>`;
  }
  return html;
}

function handleImageSelect(type, input, index) {
  const file = input.files[0];
  if (!file) { console.log('[IMAGE] ファイル未選択'); return; }
  console.log('[IMAGE] ファイル選択:', file.name, file.type, file.size, 'bytes');
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    const base64 = dataUrl.split(',')[1];
    if (index !== undefined) {
      // 複数画像モード（reg / edit）
      if (!Array.isArray(pendingImages[type])) pendingImages[type] = [null, null, null];
      pendingImages[type][index] = { base64, mimeType: file.type || 'image/jpeg', fileName: file.name || 'upload.jpg' };
      if (clearedSlots[type]) delete clearedSlots[type][index];
      const thumb  = document.getElementById('img-thumb-'  + type + '-' + index);
      const label  = document.getElementById('img-label-'  + type + '-' + index);
      const delBtn = document.getElementById('img-del-'    + type + '-' + index);
      if (thumb)  { thumb.src = dataUrl; thumb.style.display = ''; }
      if (label)  label.style.display = 'none';
      if (delBtn) delBtn.style.display = '';
    } else {
      // 単一画像モード（loan）
      pendingImages[type] = { base64, mimeType: file.type || 'image/jpeg', fileName: file.name || 'upload.jpg' };
      console.log('[IMAGE] base64変換成功 type=' + type + ' base64length=' + base64.length);
      const thumb   = document.getElementById('img-thumb-'   + type);
      const preview = document.getElementById('img-preview-' + type);
      if (thumb)   thumb.src = dataUrl;
      if (preview) preview.style.display = '';
    }
  };
  reader.onerror = function(err) { console.error('[IMAGE] FileReader エラー:', err); };
  reader.readAsDataURL(file);
}

function clearImage(type, index) {
  if (index !== undefined) {
    // 複数画像モード（reg / edit）
    if (Array.isArray(pendingImages[type])) pendingImages[type][index] = null;
    if (!clearedSlots[type]) clearedSlots[type] = {};
    clearedSlots[type][index] = true;
    const input  = document.getElementById('f-img-'   + type + '-' + index);
    const thumb  = document.getElementById('img-thumb-' + type + '-' + index);
    const label  = document.getElementById('img-label-' + type + '-' + index);
    const delBtn = document.getElementById('img-del-'   + type + '-' + index);
    if (input)  input.value = '';
    if (thumb)  { thumb.src = ''; thumb.style.display = 'none'; }
    if (label)  label.style.display = '';
    if (delBtn) delBtn.style.display = 'none';
  } else {
    // 単一画像モード（loan）
    pendingImages[type] = null;
    const input   = document.getElementById('f-img-'     + type);
    const preview = document.getElementById('img-preview-' + type);
    if (input)   input.value = '';
    if (preview) preview.style.display = 'none';
  }
}

// 単一画像アップロード（loanフォーム用）
async function uploadPendingImage(type) {
  const img = pendingImages[type];
  if (!img) { console.log('[IMAGE] アップロードスキップ（画像なし） type=' + type); return null; }
  console.log('[IMAGE] GASへPOST送信開始 action=uploadImage mimeType=' + img.mimeType + ' fileName=' + img.fileName + ' base64length=' + img.base64.length);
  try {
    const res = await apiPost('uploadImage', img);
    console.log('[IMAGE] GASレスポンス:', JSON.stringify(res));
    const url = (res && res.result && res.result.imageUrl) ? res.result.imageUrl : null;
    console.log('[IMAGE] imageUrl:', url);
    return url;
  } catch(e) {
    console.error('[IMAGE] アップロードエラー:', e.message);
    throw e;
  }
}

// 複数画像アップロード（reg / editフォーム用）最大3枚
async function uploadPendingImages(type) {
  const slots = Array.isArray(pendingImages[type]) ? pendingImages[type] : [null, null, null];
  const results = [];
  for (let i = 0; i < 3; i++) {
    const img = slots[i];
    if (!img) { results.push(null); continue; }
    try {
      const res = await apiPost('uploadImage', img);
      const url = (res && res.result && res.result.imageUrl) ? res.result.imageUrl : null;
      results.push(url);
    } catch(e) {
      console.error('[IMAGE] アップロードエラー slot=' + i, e.message);
      results.push(null);
    }
  }
  return results;
}

// 新規メーカーをMakerMasterに保存して名前を返す。既存なら何もしない。
async function saveNewMakerIfNeeded(selectId, inputId) {
  const sel = document.getElementById(selectId);
  if (sel.value !== '__new__') return sel.value.trim();
  const name = document.getElementById(inputId).value.trim();
  if (!name) return '';
  if (!db.makers) db.makers = [];
  // 同名が既にあれば追加しない
  if (!db.makers.find(m => m.name === name)) {
    const newMaker = { id: db.nextMakerId++, name, active: true };
    db.makers.push(newMaker);
    await apiPost('saveMaker', newMaker);
  }
  return name;
}

async function submitRegister() {
  const labelId = document.getElementById('f-labelid').value.trim().toUpperCase();

  const makerDue = document.getElementById('f-maker-due').value;

function exportLoansCSV() {

  });

function downloadCSV(rows, filename) {
  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function afterRender() {

async function initBarcodeDetector() {
  // iOS17+ / Chrome83+ のネイティブQR検出APIを初期化
  try {
    if ('BarcodeDetector' in window) {
      const formats = await BarcodeDetector.getSupportedFormats();
      if (formats.includes('qr_code')) {
        barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
        dbgLog('BarcodeDetector: ネイティブAPI使用（推奨）');
        return;
      }
    }
  } catch(e) {
    dbgLog(`BarcodeDetector初期化失敗: ${e.message}`);
  }
  // フォールバック: jsQRの読み込み状況を確認
  if (typeof jsQR !== 'undefined') {
    dbgLog('jsQR: ライブラリ使用（フォールバック）');
  } else {
    dbgLog('ERROR: BarcodeDetector未対応かつjsQR未ロード。スキャン不可。');
  }
}

function startScanner() {
  const video = document.getElementById('qr-video');
  if (!video) { dbgLog('ERROR: video要素が見つかりません'); return; }
  dbgLog(`startScanner UA=${navigator.userAgent.slice(0,50)}`);

  const constraints = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } };

  navigator.mediaDevices.getUserMedia(constraints)
    .catch(err => {
      dbgLog(`getUserMedia失敗: ${err.name} → フォールバック`);
      return navigator.mediaDevices.getUserMedia({ video: true });
    })
    .then(async stream => {
      const track = stream.getVideoTracks()[0];
      const s = track ? track.getSettings() : {};
      dbgLog(`カメラOK: ${s.width}x${s.height} facing=${s.facingMode||'不明'}`);
      scannerStream = stream;
      video.srcObject = stream;
      video.setAttribute('playsinline', 'true');
      video.setAttribute('muted', 'true');
      scannerActive = true;
      await initBarcodeDetector();
      await video.play();
      dbgLog(`video再生開始 size=${video.videoWidth}x${video.videoHeight}`);
      // video準備完了を待ってスキャン開始
      waitForVideoAndScan(video);
    })
    .catch(err => {
      dbgLog(`ERROR カメラ失敗: ${err.name}: ${err.message}`);
      const wrap = document.querySelector('.scanner-wrap');
      if (wrap) wrap.innerHTML = `<div style="color:white;padding:40px;text-align:center;font-size:14px;">カメラを使用できません。<br>LabelIDを直接入力してください。</div>`;
    });
}

function waitForVideoAndScan(video) {
  // videoWidth が確定するまで最大3秒待つ
  let tries = 0;
  function check() {
    if (!scannerActive) return;
    if (video.videoWidth > 0 && video.readyState >= 2) {
      dbgLog(`スキャン開始 video=${video.videoWidth}x${video.videoHeight}`);
      scanTick(video);
    } else {
      tries++;
      if (tries > 30) { dbgLog('ERROR: video準備タイムアウト(3秒)'); return; }
      if (tries % 5 === 1) dbgLog(`video待機 readyState=${video.readyState} size=${video.videoWidth}x${video.videoHeight}`);
      setTimeout(check, 100);
    }
  }
  setTimeout(check, 100);
}

async function scanTick(video) {
  if (!scannerActive) return;

  let detected = false;
  try {
    if (barcodeDetector) {
      // ── ネイティブ BarcodeDetector（iOS17+）──
      const barcodes = await barcodeDetector.detect(video);
      if (barcodes.length > 0) {
        dbgLog(`QR検出(BD): ${barcodes[0].rawValue}`);
        detected = true;
        stopScanner();
        handleScannedLabel(barcodes[0].rawValue.trim().toUpperCase());
      }
    } else if (typeof jsQR !== 'undefined') {
      // ── jsQR フォールバック ──
      const MAX_SIZE = 640;
      const vw = video.videoWidth, vh = video.videoHeight;
      const scale = Math.min(1, MAX_SIZE / Math.max(vw, vh));
      const cw = Math.floor(vw * scale), ch = Math.floor(vh * scale);
      const isPortrait = vw < vh;
      if (!scannerCanvas) {
        scannerCanvas = document.createElement('canvas');
        scannerCtx = scannerCanvas.getContext('2d', { willReadFrequently: true });
      }
      if (isPortrait) {
        scannerCanvas.width = ch; scannerCanvas.height = cw;
        scannerCtx.save();
        scannerCtx.translate(ch / 2, cw / 2);
        scannerCtx.rotate(Math.PI / 2);
        scannerCtx.drawImage(video, -cw / 2, -ch / 2, cw, ch);
        scannerCtx.restore();
      } else {
        scannerCanvas.width = cw; scannerCanvas.height = ch;
        scannerCtx.drawImage(video, 0, 0, cw, ch);
      }
      const iw = isPortrait ? ch : cw, ih = isPortrait ? cw : ch;
      const imageData = scannerCtx.getImageData(0, 0, iw, ih);
      const code = jsQR(imageData.data, iw, ih, { inversionAttempts: 'attemptBoth' });
      if (code && code.data) {
        dbgLog(`QR検出(jsQR): ${code.data}`);
        detected = true;
        stopScanner();
        handleScannedLabel(code.data.trim().toUpperCase());
      }
    } else {
      dbgLog('ERROR: スキャン手段なし（jsQR未ロード・BarcodeDetector未対応）');
    }
  } catch(e) {
    dbgLog(`ERROR scanTick: ${e.name}: ${e.message}`);
  }

  // 未検出かつアクティブならSCAN_INTERVAL_MS後に次のtick
  if (!detected && scannerActive) {
    setTimeout(() => scanTick(video), SCAN_INTERVAL_MS);
  }
}
